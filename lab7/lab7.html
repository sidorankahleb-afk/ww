<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стаж и дни между датами</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; }
        input, button, select { padding: 10px; margin: 5px; font-size: 16px; }
        button { background: #0066ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0055dd; }
        .delete-btn { background: #ff4444; padding: 5px 10px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #eee; }
        .young { background: #fff7cc; }
        .exp { background: #d4f4dd; }
        .vet { background: #cce6ff; }
        #result { margin: 20px 0; font-size: 18px; font-weight: bold; }
        .chart-container { height: 300px; margin: 30px 0; }
        .add-form { margin: 15px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Калькулятор рабочих дней и стажа</h1>

        <h2>1. Рабочие и выходные дни между датами</h2>
        <div>
            <input type="date" id="start" value="2026-03-01">
            <input type="date" id="end" value="2026-04-03">
            <button onclick="calcDays()">Рассчитать</button>
        </div>
        <div id="result"></div>

        <h2>2. Стаж сотрудников</h2>
        
        <!-- Форма добавления сотрудника -->
        <div class="add-form">
            <input type="text" id="newName" placeholder="Фамилия">
            <input type="date" id="newDate" placeholder="Дата приёма">
            <button onclick="addEmployee()">Добавить сотрудника</button>
            <button onclick="clearAllData()" style="background:#ff4444;">Очистить всё</button>
        </div>

        <table id="table">
            <thead>
                <tr>
                    <th>Фамилия</th>
                    <th>Дата приёма</th>
                    <th>Стаж (лет)</th>
                    <th>Категория</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>3. Диаграмма категорий</h2>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        let employees = [];
        let chart;

        // Ключ для localStorage
        const STORAGE_KEY = 'employeesData';

        // Загрузка данных из localStorage
        function loadEmployees() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                employees = JSON.parse(saved);
            } else {
                // Начальные данные, если ничего не сохранено
                employees = [
                    { name: "Иванов", date: "2025-06-01" },
                    { name: "Петров", date: "2024-01-15" },
                    { name: "Сидорова", date: "2022-09-01" },
                    { name: "Кузнецов", date: "2020-02-20" },
                    { name: "Смирнова", date: "2019-11-05" },
                    { name: "Васильев", date: "2023-12-01" }
                ];
                saveEmployees();
            }
        }

        // Сохранение в localStorage
        function saveEmployees() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
        }

        // Расчёт стажа в полных годах
        function getYears(hireDate) {
            const hire = new Date(hireDate);
            const now = new Date();
            let years = now.getFullYear() - hire.getFullYear();
            if (now.getMonth() < hire.getMonth() || 
               (now.getMonth() === hire.getMonth() && now.getDate() < hire.getDate())) {
                years--;
            }
            return Math.max(0, years);
        }

        // Заполнение таблицы
        function fillTable() {
            const tbody = document.querySelector('#table tbody');
            tbody.innerHTML = '';
            
            let young = 0, exp = 0, vet = 0;

            employees.forEach((emp, index) => {
                const years = getYears(emp.date);
                let cat = '', cls = '';
                
                if (years < 1) { cat = 'молодой'; cls = 'young'; young++; }
                else if (years <= 5) { cat = 'опытный'; cls = 'exp'; exp++; }
                else { cat = 'ветеран'; cls = 'vet'; vet++; }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${emp.name}</td>
                    <td>${emp.date}</td>
                    <td>${years}</td>
                    <td class="${cls}">${cat}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteEmployee(${index})">Удалить</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            drawChart(young, exp, vet);
        }

        // Добавление нового сотрудника
        function addEmployee() {
            const nameInput = document.getElementById('newName');
            const dateInput = document.getElementById('newDate');
            
            const name = nameInput.value.trim();
            const date = dateInput.value;

            if (!name || !date) {
                alert('Пожалуйста, заполните фамилию и дату приёма');
                return;
            }

            employees.push({ name, date });
            saveEmployees();
            fillTable();

            // Очистка полей
            nameInput.value = '';
            dateInput.value = '';
        }

        // Удаление сотрудника
        function deleteEmployee(index) {
            if (confirm('Удалить этого сотрудника?')) {
                employees.splice(index, 1);
                saveEmployees();
                fillTable();
            }
        }

        // Очистка всех данных
        function clearAllData() {
            if (confirm('Очистить ВСЕ данные сотрудников? Это действие нельзя отменить.')) {
                localStorage.removeItem(STORAGE_KEY);
                employees = [];
                fillTable();
            }
        }

        // Калькулятор дней 
        function calcDays() {
            const start = new Date(document.getElementById('start').value);
            const end = new Date(document.getElementById('end').value);
            
            if (!start || !end || start > end) {
                document.getElementById('result').innerHTML = '❌ Проверьте даты';
                return;
            }

            let work = 0, weekend = 0;
            let current = new Date(start);

            while (current <= end) {
                const day = current.getDay();
                if (day === 0 || day === 6) weekend++;
                else work++;
                current.setDate(current.getDate() + 1);
            }

            document.getElementById('result').innerHTML = `
                Рабочих дней: <b>${work}</b> | 
                Выходных дней: <b>${weekend}</b> | 
                Всего: <b>${work + weekend}</b>
            `;
        }

        // Круговая диаграмма
        function drawChart(young, exp, vet) {
            const ctx = document.getElementById('myChart');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Молодой', 'Опытный', 'Ветеран'],
                    datasets: [{
                        data: [young, exp, vet],
                        backgroundColor: ['#ffeb3b', '#4caf50', '#2196f3']
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // Запуск при загрузке страницы
        window.onload = function() {
            loadEmployees();
            fillTable();
        };
    </script>
</body>
</html>
